# Instrumental parameters ==============================

#
# Mirror ==============================
#
[telescope]
diameter_ext = 3.0         # Primary mirror external diameter [m]
diameter_int = 0           # Primary mirror internal diameter [m]
temperature = [283, 253, 283, 278]          # Mirror temperature [K] (0 for none)
emissivity = [0.05, 0.02, 0.02, 0.02]       # Mirror emissivity
nelements = [1, 1, 1, 1]  		    # number of optics per elements

# NOT USED
# [spectrograph.camera]
# acceptance = 0.6           # Camera acceptance [rad]
# speed = 32                 # Camera speed (f-number)

#
# Spectrograph ==============================
#

[spectrograph]
name = "NACRE (baseline)"
spectral_range = [4_000, 17_000]  # Wavelength domain [Å]
lbda_ref = 10_000               # reference wavelength [Å]

## internal composition, used for thermal emission computation

## disperion *or* spectral resolution
dispersion_law = "dispersion_offner.ecsv"  # Dispersion law ECSV file
                                           # (wavelength, offset [px])
                                           # (should be consistent w/ px_size)
dispersion_scale = 1.3                     # Dispersion law scaling 1.3: default, 1.7 = Bertin's
dispersion_resolution = 2.5		   # number of pixel per resolution element.

# spectral_resolution and dispersion_law are mutually exclusive
# spectral_resolution = 100   # Constant 2-px resolving power (log sampling)

# ---- Spaxel structure
spatial_scale = 0.040      	    # MLA sampling (spaxel scale) [arcsec/spx]
spatial_shape = [58, 116]   	    # MLA shape (ny, nx) [spatial]

# ---- Throughput
throughput = "throughput_baseline.ecsv"  # Total throughput, but QE (wavelength, throughput) | could be a float


## Optics ---------------------
[spectrograph.optics]
temperature = [250, 210, 210, 250]          # Mirror temperature [K] (0 for none)
emissivity = [0.05, 0.05, 0.03, 0.03]       # Mirror emissivity
nelements = [5, 6, 1, 4]  		    # number of optics per elements
fratio = [ [15, 30], [7.5, 5.2], [7.5, 5.2], [7.5, 5.2] ]
geometry = ["circular", "square", "square", "square"] # optics geometrical shape

## Point Spread Function ---------------------
[spectrograph.psf.detector]
xdisp_profile = "normal"
xdisp_sigma_spectral = 0.9	# Chromatic (∝ λ) cross-dispersion PSF [px] at {lbda_ref}
xdisp_sigma = 0.3      		# Achromatic cross-dispersion PSF [px]

[spectrograph.psf.spatial]
psf_profile = "normal"		# Chromatic PSF profile
psf_sigma_spectral = "default"  # Chromatic (∝ λ) spatial PSF on MLA [arcsec] at {lbda_ref}
guiding_profile = "normal"      # Achromatic guiding/jitter/aberrations profile
guiding_sigma = 0.010       	# Achromatic guiding/jitter/aberrations on MLA [arcsec]



#
# Detector ==============================
#

[detector]
name = "H4RG17"
# QE: either a constant or an ECSV file
# QE = 0.8                   # Constant quantum efficiency [e-/ph]
QE = "H4RG17.ecsv"         # Quantum efficiency ECSV file [e-/ph] (wavelength, qe)
gain = 1.0                 # Gain [ADU/e-]
# lbda_range = [2_000, 17_000] # range of accepted wavelengths, e.g. no cold stop at 1.8 microns (note: qe is applied on top).

saturation = 65635         # Saturation limit [ADU] (0 for none)
readout_noise = 10.0       #  read-out noise per frame [e-]
tframe = 2.830             # Single frame (read) time [s]
pixel_size = 10.0          # Pixel physical size [µm]
                           # (should be consistent w/ dispersion_law)
			   
readout_mode = [16, 8, 0]  # (N * (M + D) - D) = 256 frames, exptime = 12'05''
max_group = 64 	           # maximum number of groups per ramp
variance_model = "Rauscher07"  # Variance model (Kubik20 or Rauscher07)
dark = 2.8e-3              # Dark current [e-/s/px] 

# NOT IMPLEMENTED: dark current as function of detector temperature
# cutoff = 1.7         # Cut-off wavelength [µm] (for dark current)
# temperature = 0      # Temperature [K] (for dark current, 0 for none)




#
# Extraction ==============================
#
[extraction]
xdisp_width_insigma = 10	# Spectrogram cross-disp. aperture width [xdisp_sigma]
aperture_radius_insigma = 10  	# Spatial aperture radius [spatial_sigma]
nramps = 1                     	# Number of (similar) ramps

# All extractions are optimal (i.e. profile weighted least-squares)
#xdisp_width = 10      # Spectrogram *integer* cross-disp. aperture width [px]
# Point-source aperture can be expressed in 'spatial_sigma' (at 1 µm).
# Take it large enough to accomodate most of the flux at all the wavelengths
#aperture_radius = 20          # Point-source spatial aperture radius [spx]
