name: Run unit tests

on:
  pull_request:
  push:
    branches:
    - main
    tags:
  workflow_dispatch:
  schedule:
    # Run every Sunday at 05:34 UTC
    - cron: 34 5 * * 0

permissions:
  contents: read

jobs:
  tests:
    name: Test Run (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - python-version: "3.14"
            os: ubuntu-latest
            toxenv: "314-cov"
          - python-version: "3.11"
            os: macos-latest
            toxenv: "311-cov"

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: python -m pip install --upgrade pip tox coverage
      - name: Run tests with pytest & tox
        run: tox run -e ${{ matrix.toxenv }}
      - name: Convert coverage
        run: python -m coverage xml
      # You only need to upload code coverage once to codecov unless you have a
      # more complex build that you need coverage for.
      - name: Upload coverage to Codecov
        if: ${{ matrix.os == 'ubuntu-latest' &&  matrix.python-version == '3.14'}}
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          # token: ${{ secrets.CODECOV_TOKEN }}
